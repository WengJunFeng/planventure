services:
  minio:
    image: minio/minio:latest
    container_name: planventure-minio
    restart: unless-stopped
    ports:
      - "9000:9000" # S3-compatible API
      - "9001:9001" # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minio_data:
    driver: local
